<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Strange Path Engine Demo</title>
    </head>
    <body>
        <main id="app">
            <section class="stage" aria-label="Engine demo stage">
                <canvas id="game" aria-label="Single area side-view ray tracing demo viewport"></canvas>
                <aside class="panel" aria-label="Engine demo controls and diagnostics">
                    <div class="panel-section">
                        <button id="sound-toggle" type="button">Enable sound</button>
                    </div>
                    <div class="panel-section">
                        <label>
                            <input id="debug-lighting" type="checkbox" checked />
                            Lighting rays
                        </label>
                        <label>
                            <input id="debug-collision" type="checkbox" checked />
                            Collision
                        </label>
                    </div>
                    <dl class="metrics">
                        <div>
                            <dt>FPS</dt>
                            <dd id="metric-fps">0</dd>
                        </div>
                        <div>
                            <dt>Frame</dt>
                            <dd id="metric-frame">0ms</dd>
                        </div>
                        <div>
                            <dt>Update</dt>
                            <dd id="metric-update">0ms</dd>
                        </div>
                        <div>
                            <dt>Render</dt>
                            <dd id="metric-render">0ms</dd>
                        </div>
                        <div>
                            <dt>Ray time</dt>
                            <dd id="metric-ray-time">0ms</dd>
                        </div>
                        <div>
                            <dt>Rays</dt>
                            <dd id="metric-rays">0</dd>
                        </div>
                        <div>
                            <dt>Checks</dt>
                            <dd id="metric-checks">0</dd>
                        </div>
                        <div>
                            <dt>Memory</dt>
                            <dd id="metric-memory">n/a</dd>
                        </div>
                        <div>
                            <dt>Grounded</dt>
                            <dd id="metric-grounded">false</dd>
                        </div>
                        <div>
                            <dt>Velocity</dt>
                            <dd id="metric-velocity">0, 0</dd>
                        </div>
                    </dl>
                </aside>
            </section>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
